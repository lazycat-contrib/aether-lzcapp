# Aether - Setup Wizard Configuration
# LPK v2 format - strict field compliance

params:
  # Admin account (required for initial setup)
  - id: admin_email
    type: string
    name: "Admin Email"
    description: "Administrator email address (valid email format required, used for initial setup only)"
    default_value: "admin@example.com"
    optional: false

  - id: admin_username
    type: string
    name: "Admin Username"
    description: "Administrator username (3-20 characters, letters/numbers/underscores only, used for initial setup only)"
    default_value: "admin"
    optional: false

  - id: admin_password
    type: secret
    name: "Admin Password"
    description: "Administrator password (minimum 8 characters required, can be changed in system later)"
    default_value: ""
    optional: false

  # Optional settings
  - id: api_key_prefix
    type: string
    name: "API Key Prefix"
    description: "Prefix for generated API keys"
    default_value: "sk"
    optional: true

  - id: log_level
    type: string
    name: "Log Level"
    description: "Application log level (DEBUG, INFO, WARNING, ERROR)"
    default_value: "INFO"
    optional: true

  - id: gunicorn_workers
    type: string
    name: "Worker Processes"
    description: "Number of Gunicorn worker processes (1-16)"
    default_value: "4"
    optional: true

locales:
  zh:
    admin_email:
      name: "管理员邮箱"
      description: "管理员邮箱地址（需为有效邮箱格式，仅首次初始化时使用）"
    admin_username:
      name: "管理员用户名"
      description: "管理员用户名（3-20字符，仅字母数字下划线，仅首次初始化时使用）"
    admin_password:
      name: "管理员密码"
      description: "管理员密码（至少8字符，创建后可在系统内修改）"
    api_key_prefix:
      name: "API Key 前缀"
      description: "生成的 API Key 的前缀"
    log_level:
      name: "日志级别"
      description: "应用日志级别（DEBUG, INFO, WARNING, ERROR）"
    gunicorn_workers:
      name: "工作进程数"
      description: "Gunicorn 工作进程数量（1-16）"